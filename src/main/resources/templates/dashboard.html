<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>SmartHire AI</title>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f7fc;
}

.container{
    max-width:1000px;
    margin:50px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 2px 15px rgba(0,0,0,0.1);
}

h1{
    color:#007bff;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:30px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    border:1px solid #ddd;
    border-radius:6px;
}

button{
    margin-top:25px;
    background:#007bff;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<h1>SmartHire AI</h1>

<p class="subtitle">
AI Powered Candidate Ranking Platform
</p>

<form action="/results" method="get">

<label>Job Title</label>

<input
type="text"
name="title"
value="AI Engineer"
required>

<label>Skills (comma separated)</label>

<input
type="text"
name="skills"
value="Python,LLM,RAG,Retrieval,Vector"
required>

<label>Minimum Experience</label>

<input
type="number"
name="minExperience"
value="5"
required>

<label>Maximum Experience</label>

<input
type="number"
name="maxExperience"
value="10"
required>

<button type="submit">

Rank Candidates

</button>

</form>

</div>

</body>

</html>
